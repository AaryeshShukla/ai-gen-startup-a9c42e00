<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Startup Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a1a;
            --secondary-bg: linear-gradient(135deg, #6a11cb, #2575fc);
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-hover-bg: rgba(255, 255, 255, 0.2);
            --glow-color: rgba(38, 198, 218, 0.5);
            --transition-speed: 0.3s;
        }
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
        }
        header {
            position: sticky;
            top: 0;
            background: var(--primary-bg);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        nav a {
            color: var(--text-color);
            margin: 0 15px;
            text-decoration: none;
            transition: color var(--transition-speed);
        }
        nav a:hover {
            color: var(--glow-color);
        }
        .cta {
            background: var(--glow-color);
            padding: 10px 20px;
            border-radius: 24px;
            transition: background var(--transition-speed);
        }
        .cta:hover {
            background: rgba(38, 198, 218, 0.8);
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--secondary-bg);
            color: var(--text-color);
            position: relative;
        }
        .hero h1 {
            font-size: 3rem;
            margin: 0;
        }
        .hero form {
            margin-top: 20px;
        }
        .hero input {
            padding: 10px;
            border-radius: 12px;
            border: none;
            width: 300px;
        }
        .hero button {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            background: var(--glow-color);
            color: var(--text-color);
            cursor: pointer;
            transition: background var(--transition-speed);
        }
        .hero button:hover {
            background: rgba(38, 198, 218, 0.8);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 20px;
        }
        .feature-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            transition: transform var(--transition-speed), background var(--transition-speed);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .feature-card:hover {
            transform: scale(1.05);
            background: var(--card-hover-bg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .pricing {
            padding: 50px 20px;
            text-align: center;
        }
        .pricing-table {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .pricing-option {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin: 0 10px;
            transition: transform var(--transition-speed);
        }
        .pricing-option:hover {
            transform: scale(1.05);
        }
        .reviews {
            padding: 50px 20px;
        }
        .faq {
            padding: 50px 20px;
        }
        .faq-item {
            margin: 10px 0;
            cursor: pointer;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            transition: background var(--transition-speed);
        }
        .faq-item:hover {
            background: var(--card-hover-bg);
        }
        footer {
            padding: 20px;
            text-align: center;
            background: var(--primary-bg);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Jersey Startup</div>
        <nav>
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a>
            <a href="#reviews">Reviews</a>
            <a href="#faq">FAQ</a>
        </nav>
        <div class="cta">Get Started</div>
    </header>
    <section class="hero">
        <h1>Get Your Favorite Jerseys</h1>
        <form id="email-form">
            <input type="email" placeholder="Enter your email" required />
            <button type="submit">Subscribe</button>
        </form>
    </section>
    <section id="features" class="features">
        <div class="feature-card">Feature 1</div>
        <div class="feature-card">Feature 2</div>
        <div class="feature-card">Feature 3</div>
    </section>
    <section id="pricing" class="pricing">
        <h2>Pricing Plans</h2>
        <div class="pricing-table">
            <div class="pricing-option">Monthly Plan</div>
            <div class="pricing-option">Annual Plan</div>
        </div>
    </section>
    <section id="reviews" class="reviews">
        <h2>Customer Reviews</h2>
        <div class="review-slider">Review 1</div>
        <div class="review-slider">Review 2</div>
    </section>
    <section id="faq" class="faq">
        <h2>Frequently Asked Questions</h2>
        <div class="faq-item">Question 1</div>
        <div class="faq-item">Question 2</div>
    </section>
    <footer>
        <p>&copy; 2023 Jersey Startup. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('email-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const emailInput = event.target.querySelector('input[type="email"]').value;
            alert(`Thank you for subscribing with ${emailInput}!`);
            event.target.reset();
        });
    </script>
</body>
</html>
